```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Advanced Orbital Engine - Deep Logic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: 'Segoe UI', monospace; }
        #debug { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="debug">
        <div id="status">物理引擎: 激活 (Newtonian Gravity)</div>
        <div id="data">轨道坐标: 初始化...</div>
    </div>
    <script>
        // 核心参数设置 (深度推理模式下使用物理常数)
        const G = 0.5; // 万有引力常数 (模拟环境缩放)
        const dt = 0.01; // 时间步长

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 创建中心恒星 (物理核心)
        const sunGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // 创建行星 (带物理矢量)
        const planet = {
            mesh: new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), new THREE.MeshPhongMaterial({ color: 0x4488ff })),
            pos: new THREE.Vector3(2, 0, 0),
            vel: new THREE.Vector3(0, 0.5, 0)
        };
        scene.add(planet.mesh);
        scene.add(new THREE.AmbientLight(0x444444));
        scene.add(new THREE.PointLight(0xffffff, 1.5, 50));

        camera.position.z = 5;

        function updatePhysics() {
            // 计算引力矢量: F = G * M1 * M2 / r^2
            let dist = planet.pos.length();
            let force = planet.pos.clone().normalize().multiplyScalar(-G / (dist * dist));
            
            // 更新速度与位移
            planet.vel.add(force.multiplyScalar(dt));
            planet.pos.add(planet.vel.clone().multiplyScalar(dt));
            planet.mesh.position.copy(planet.pos);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            document.getElementById('data').innerText = `坐标: ${planet.pos.x.toFixed(2)}, ${planet.pos.y.toFixed(2)}`;
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
