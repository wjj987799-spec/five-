<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega V12 算力全开 | 量化锚定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b14; color: #c9d1d9; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .profit-green { color: #10b981; }
        .loss-red { color: #ef4444; }
        .market-closed { color: #6e7681; }
        .glass-panel { background: rgba(13, 17, 23, 0.7); border: 1px solid #1f2937; border-radius: 12px; transition: all 0.3s ease; }
        .panel-closed { background: rgba(10, 12, 16, 0.9); border: 1px solid #30363d; opacity: 0.7; filter: grayscale(80%); }
        ::-webkit-scrollbar { display: none; }
        
        /* 智能选股扫描动画 */
        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s infinite linear;
            box-shadow: 0 0 10px #3b82f6;
        }
        @keyframes scan {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(60px); opacity: 0; }
        }
    </style>
</head>
<body class="p-4 flex flex-col gap-4 min-h-screen">
    
    <header class="glass-panel p-4 flex justify-between items-center border-b-2 border-blue-500">
        <div>
            <h1 class="text-xl font-bold text-blue-400" style="text-shadow: 0 0 10px rgba(88,166,255,0.5);">Alpha-Omega 量化终端 V12</h1>
            <p class="text-xs text-green-400 mt-1" id="sync-status">● 算力全开，实盘数据强制锚定中</p>
        </div>
        <div class="text-right text-xs font-mono text-gray-500" id="local-clock">
            --:--:--
        </div>
    </header>

    <div class="glass-panel p-4 relative overflow-hidden border-l-4 border-yellow-500">
        <div class="scan-line"></div>
        <div class="flex justify-between items-center relative z-10">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                <h2 class="text-sm font-bold text-yellow-500">AI 量化突击扫描系统 (DeepSeek-Omega 核心)</h2>
            </div>
            <span class="text-xs text-gray-400">实时过滤 5300+ 标的</span>
        </div>
        <div class="mt-3 bg-black/50 rounded p-3 font-mono text-sm border border-gray-800">
            <p id="ai-log" class="text-gray-300">正在初始化神经网络参数...</p>
        </div>
    </div>

    <main id="market-container" class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto pb-4">
        </main>

    <script>
        // ==========================================
        // 配置中心：支持无限扩展的资产池
        // type: 1(Crypto 7x24), 2(美股), 3(A股)
        // ==========================================
        const assets = {
            trx:  { name: 'TRX/USDT', code: 'CRYPTO', price: 0.11500, vol: 0.0001, dec: 5, color: 'blue', type: 1, history: Array(40).fill(0.11500), isOpen: true },
            tsla: { name: '特斯拉', code: 'TSLA', price: 245.78, vol: 0.15, dec: 2, color: 'purple', type: 2, history: Array(40).fill(245.78), isOpen: false },
            sse:  { name: '上证指数', code: '000001', price: 3106.25, vol: 1.5, dec: 2, color: 'red', type: 3, history: Array(40).fill(3106.25), isOpen: false },
            moutai:{ name: '贵州茅台', code: '600519', price: 1680.50, vol: 1.2, dec: 2, color: 'red', type: 3, history: Array(40).fill(1680.50), isOpen: false },
            byd:  { name: '比亚迪', code: '002594', price: 258.30, vol: 0.8, dec: 2, color: 'red', type: 3, history: Array(40).fill(258.30), isOpen: false },
            catl: { name: '宁德时代', code: '300750', price: 205.10, vol: 0.6, dec: 2, color: 'red', type: 3, history: Array(40).fill(205.10), isOpen: false },
            seres:{ name: '赛力斯', code: '601127', price: 92.45, vol: 0.9, dec: 2, color: 'red', type: 3, history: Array(40).fill(92.45), isOpen: false }
        };

        // ==========================================
        // UI 渲染引擎：动态生成行情面板
        // ==========================================
        const container = document.getElementById('market-container');
        Object.keys(assets).forEach(key => {
            const asset = assets[key];
            const html = `
                <div id="panel-${key}" class="glass-panel p-3 flex flex-col gap-2 relative overflow-hidden border-l-4 border-${asset.color}-500">
                    <div class="flex justify-between items-end z-10">
                        <div>
                            <p class="text-xs text-${asset.color}-400 font-mono mb-1">${asset.code} | ${asset.name}</p>
                            <div id="price-${key}" class="text-4xl font-mono font-bold profit-green transition-colors">${asset.price.toFixed(asset.dec)}</div>
                        </div>
                        <div class="text-right"><p id="trend-${key}" class="text-sm font-bold profit-green">SYNCED</p></div>
                    </div>
                    <div class="h-24 w-full bg-black/40 rounded border border-gray-800 shadow-inner relative z-10">
                        <svg id="svg-${key}" class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                            <polyline id="line-${key}" fill="none" stroke="#10b981" stroke-width="2" vector-effect="non-scaling-stroke"></polyline>
                        </svg>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });

        // ==========================================
        // 核心：时间锁机制与市场状态强制渲染
        // ==========================================
        function checkAndRenderMarketStatus() {
            const now = new Date();
            const day = now.getDay();
            const hours = now.getHours();
            const mins = now.getMinutes();
            const timeVal = hours * 100 + mins;
            const isWeekend = (day === 0 || day === 6);

            document.getElementById('local-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false }) + ' (UTC+8)';

            Object.keys(assets).forEach(key => {
                const asset = assets[key];
                
                // 判断开休市逻辑
                if (asset.type === 1) { 
                    asset.isOpen = true; // Crypto 7x24
                } else if (asset.type === 3) { 
                    // A股
                    asset.isOpen = !isWeekend && ((timeVal >= 930 && timeVal <= 1130) || (timeVal >= 1300 && timeVal <= 1500));
                } else if (asset.type === 2) { 
                    // 美股夏令时 (简易逻辑)
                    if (!isWeekend && timeVal >= 2130 && timeVal <= 2359) asset.isOpen = true;
                    else if (day >= 2 && day <= 6 && timeVal >= 0 && timeVal <= 400) asset.isOpen = true;
                    else asset.isOpen = false;
                }

                // 更新 UI 样式
                const panel = document.getElementById(`panel-${key}`);
                const trendEl = document.getElementById(`trend-${key}`);
                const priceEl = document.getElementById(`price-${key}`);
                const lineEl = document.getElementById(`line-${key}`);
                
                if (!asset.isOpen) {
                    panel.classList.add('panel-closed');
                    trendEl.innerText = "CLOSED";
                    trendEl.className = "text-sm font-bold market-closed";
                    priceEl.className = `text-4xl font-mono font-bold market-closed`;
                    lineEl.setAttribute('stroke', '#6e7681'); 
                } else {
                    panel.classList.remove('panel-closed');
                }
            });
        }

        // ==========================================
        // 原生高频推演渲染引擎 (价格跳动模拟)
        // ==========================================
        function updateTick() {
            checkAndRenderMarketStatus(); 

            Object.keys(assets).forEach(key => {
                const asset = assets[key];
                if (!asset.isOpen) return;
                
                const change = (Math.random() - 0.5) * asset.vol;
                const oldPrice = asset.price;
                let displayPrice = +(asset.price + change).toFixed(asset.dec);
                asset.price = displayPrice; // 更新基准价，让漫步更真实

                asset.history.push(displayPrice);
                asset.history.shift();

                const priceEl = document.getElementById(`price-${key}`);
                const trendEl = document.getElementById(`trend-${key}`);
                const lineEl = document.getElementById(`line-${key}`);
                
                const isUp = displayPrice >= oldPrice;
                const colorClass = isUp ? "profit-green" : "loss-red";
                const hexColor = isUp ? "#10b981" : "#ef4444";

                priceEl.innerText = displayPrice.toLocaleString('en-US', { minimumFractionDigits: asset.dec, maximumFractionDigits: asset.dec });
                priceEl.className = `text-4xl font-mono font-bold transition-colors ${colorClass}`;
                
                trendEl.innerText = isUp ? "BUY+" : "SELL-";
                trendEl.className = `text-sm font-bold ${colorClass}`;
                lineEl.setAttribute('stroke', hexColor);

                const min = Math.min(...asset.history);
                const max = Math.max(...asset.history);
                const range = max - min || 0.0001;

                const points = asset.history.map((val, i) => {
                    const x = (i / 39) * 100; 
                    const y = 100 - ((val - min) / range) * 100; 
                    return `${x},${y}`;
                }).join(' ');

                document.getElementById(`svg-${key}`).setAttribute('viewBox', `0 0 100 100`);
                lineEl.setAttribute('points', points);
            });

            setTimeout(() => requestAnimationFrame(updateTick), 800); // 调慢了刷新率避免瞎眼
        }

        // ==========================================
        // AI 智能选股系统 (伪造量化逻辑)
        // ==========================================
        const aiLog = document.getElementById('ai-log');
        const aSharePool = Object.keys(assets).filter(k => assets[k].type === 3 && k !== 'sse');
        const actions = ["主力大单抢筹", "MACD底背离", "突破箱体上沿", "量价齐升", "暗盘资金异动"];
        
        function triggerAIAnalysis() {
            // 随机抽取一个 A 股标的
            const randomKey = aSharePool[Math.floor(Math.random() * aSharePool.length)];
            const target = assets[randomKey];
            const action = actions[Math.floor(Math.random() * actions.length)];
            const winRate = (85 + Math.random() * 14).toFixed(1); // 85% - 99% 胜率
            const capital = (Math.random() * 10 + 1).toFixed(1); // 1-11 亿资金

            const isBuy = Math.random() > 0.2; // 80% 概率出买入信号

            if(isBuy) {
                aiLog.innerHTML = `<span class="profit-green font-bold">[ 强力买入 ]</span> 发现 <span class="text-white">${target.name} (${target.code})</span> 出现 <span class="text-yellow-400">${action}</span>。<br>> 算法预测胜率：<span class="text-blue-400">${winRate}%</span> | 净流入资金：<span class="text-red-400">+${capital} 亿</span>`;
            } else {
                aiLog.innerHTML = `<span class="text-blue-400">[ 深度洗盘 ]</span> 监测到 <span class="text-white">${target.name}</span> 散户筹码松动，等待更好的建仓击球点...`;
            }
        }

        // 引擎点火
        updateTick();
        setInterval(triggerAIAnalysis, 3500); // 每 3.5 秒刷新一次AI日志

    </script>
</body>
</html>
