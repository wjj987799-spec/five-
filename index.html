<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega: 赛博命盘详细解析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030303; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;
            display: flex; flex-direction: row; /* 改为左右布局 */
            justify-content: center; align-items: center; gap: 50px;
            pointer-events: none;
        }

        /* 左侧：视觉交互区 */
        #visual-section {
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        #element-title { font-size: 32px; letter-spacing: 12px; font-weight: 300; margin-bottom: 5px; transition: all 0.5s; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .subtitle { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 20px;}
        #chart-container {
            pointer-events: auto; width: 400px; height: 400px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            border-radius: 50%; transition: box-shadow 0.5s, border-color 0.5s;
        }

        /* 右侧：详细解析面板 (新增) */
        #analysis-panel {
            width: 450px; height: 500px;
            background: rgba(0, 15, 20, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1) inset;
            backdrop-filter: blur(10px);
            padding: 30px; box-sizing: border-box;
            display: none; /* 初始隐藏 */
            flex-direction: column;
            pointer-events: auto;
            position: relative;
        }
        
        /* 面板四角的科幻修饰 */
        #analysis-panel::before, #analysis-panel::after { content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid transparent; }
        #analysis-panel::before { top: 0; left: 0; border-top-color: #00ffff; border-left-color: #00ffff; }
        #analysis-panel::after { bottom: 0; right: 0; border-bottom-color: #00ffff; border-right-color: #00ffff; }

        .panel-header { font-size: 18px; font-weight: bold; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 2px; display: flex; justify-content: space-between;}
        .status-blinking { animation: blink 1s infinite; font-size: 12px; color: #00ff66; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 打字机文本容器 */
        #typewriter-text {
            font-size: 14px; line-height: 1.8; color: #e0e0e0;
            overflow-y: auto; flex-grow: 1; padding-right: 10px;
            text-shadow: 0 0 2px rgba(255,255,255,0.2);
        }
        /* 自定义滚动条 */
        #typewriter-text::-webkit-scrollbar { width: 5px; }
        #typewriter-text::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.5); }

        /* 底部控制台 */
        #input-console {
            position: absolute; bottom: 5%; display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: auto; background: rgba(0, 0, 0, 0.6); padding: 15px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
        }
        .input-group { display: flex; gap: 15px; align-items: center; }
        input[type="datetime-local"] { background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffff; color: #00ffff; padding: 8px 15px; font-family: inherit; font-size: 14px; outline: none; }
        ::-webkit-calendar-picker-indicator { filter: invert(1) hue-rotate(180deg); cursor: pointer; }
        .btn-calc { background: rgba(0,255,255,0.1); border: 1px solid #00ffff; color: #00ffff; padding: 8px 25px; font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        .btn-calc:hover { background: rgba(0, 255, 255, 0.3); box-shadow: 0 0 15px #00ffff inset; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="visual-section">
            <div id="element-title">输入时空坐标</div>
            <div class="subtitle">AWAITING TEMPORAL DATA</div>
            <div id="chart-container"></div>
        </div>

        <div id="analysis-panel">
            <div class="panel-header">
                <span id="panel-title">流年大运推演模型</span>
                <span class="status-blinking">● LIVE DATA</span>
            </div>
            <div id="typewriter-text"></div>
        </div>
    </div>

    <div id="input-console">
        <div class="input-group">
            <input type="datetime-local" id="birth-input" value="1998-08-08T08:00">
            <button class="btn-calc" id="calc-btn">载入矩阵</button>
        </div>
    </div>

    <script>
        // --- 1. ECharts 初始化 ---
        const myChart = echarts.init(document.getElementById('chart-container'));
        let currentOption = {
            backgroundColor: 'transparent',
            radar: {
                indicator: [ {name:'水', max:100}, {name:'火', max:100}, {name:'木', max:100}, {name:'金', max:100}, {name:'土', max:100} ],
                center: ['50%', '50%'], radius: '60%', shape: 'polygon', splitNumber: 4,
                axisName: { color: '#ffffff', fontSize: 14 },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                splitArea: { show: false },
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } }
            },
            series: [{ type: 'radar', data: [{ value: [20,20,20,20,20], itemStyle:{color:'#fff'}, lineStyle:{color:'#fff', width:2}, areaStyle:{color:'rgba(255,255,255,0.1)'} }] }]
        };
        myChart.setOption(currentOption);

        // --- 2. 模拟大模型文案生成库 ---
        // 结合传统八字与量化金融术语的赛博断语
        const textDatabase = {
            wealth: [
                "【流动性池分析】当前偏财星高透，适合捕捉高波动率标的。加密资产维度存在短期套利空间，但切忌在链上进行过高的杠杆博弈。",
                "【资产矩阵推演】正财稳健，日主承压。建议收缩投资敞口，将资产转移至主流价值网络（如BTC或核心蓝筹），等待下一次大级别共识周期。",
                "【波段机会预警】食神生财，短期内你对数据和盘感的直觉将极度敏锐，适合通过自动化网格或高频脚本捕获市场摩擦收益。"
            ],
            career: [
                "【架构演进节点】官杀印相生，事业线进入重构期。如果是独立开发，本季度有望跑通最小可行性产品（MVP），并获得极客圈层的流量注入。",
                "【算力分配建议】比劫夺财，团队协作可能出现代码合并冲突或利益分配不均。建议提升个人的单兵作战能力，深耕底层技术栈。"
            ],
            fortune: [
                "【胜率期望演算】本周期内，印星护体，你的直觉判断准确率（如重大赛事比分预测、波胆推演）上升 23%。但切记，概率学规律不可逆，做好仓位管理。",
                "【时空风水校准】近期最佳能量接入方位为正东方（木属性）。在进行高强度的代码构建或市场复盘时，可将显示器矩阵朝向此方位以稳定神经突触。"
            ]
        };

        // 获取基于哈希的随机文本
        function generateCyberFortune(hash) {
            const getStr = (arr, offset) => arr[(hash + offset) % arr.length];
            return `[核心数据载入完毕...]\n\n` +
                   `> 命局概览：\n日主已确立，五行能量分布呈现不均衡态。底层逻辑架构带有极强的反共识特征。\n\n` +
                   `> 财富与量化维度：\n${getStr(textDatabase.wealth, 1)}\n\n` +
                   `> 事业与开发维度：\n${getStr(textDatabase.career, 2)}\n\n` +
                   `> 博弈与胜率期望：\n${getStr(textDatabase.fortune, 3)}\n\n` +
                   `[SYSTEM WARNING]: 命运非线性函数，以上仅为高概率路径预测。`;
        }

        // --- 3. 打字机特效引擎 ---
        let typewriterTimeout;
        function typeWriterEffect(text, elementId, speed = 30) {
            clearTimeout(typewriterTimeout);
            const el = document.getElementById(elementId);
            el.innerHTML = '';
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    let char = text.charAt(i);
                    // 处理换行符
                    if (char === '\n') {
                        el.innerHTML += '<br>';
                    } else {
                        el.innerHTML += char;
                    }
                    // 自动滚动到底部
                    el.scrollTop = el.scrollHeight;
                    i++;
                    typewriterTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        // --- 4. 核心交互绑定 ---
        document.getElementById('calc-btn').addEventListener('click', () => {
            const dateStr = document.getElementById('birth-input').value;
            if(!dateStr) return;

            // 1. 解析面板展示
            const panel = document.getElementById('analysis-panel');
            panel.style.display = 'flex';
            
            // 2. 模拟前端哈希演算
            const timestamp = new Date(dateStr).getTime();
            let hash = timestamp.toString(16).split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            
            // 这里为了演示，固定赋予一种高科技主题色（比如偏火的赤红色，或者你可以沿用之前五行切换颜色的逻辑）
            const themeColor = '#00ffff'; 
            
            // 3. 驱动雷达图更新 (模拟数据)
            currentOption.series[0].data[0].value = [
                (hash % 40) + 10, (hash % 50) + 20, (hash % 30) + 15, (hash % 60) + 5, (hash % 45) + 10
            ];
            currentOption.radar.axisName.color = themeColor;
            currentOption.series[0].data[0].itemStyle.color = themeColor;
            currentOption.series[0].data[0].lineStyle.color = themeColor;
            currentOption.series[0].data[0].areaStyle.color = `rgba(0,255,255,0.2)`;
            myChart.setOption(currentOption);

            // 4. 生成运势文本并启动打字机特效
            const detailedFortuneText = generateCyberFortune(hash);
            document.getElementById('panel-title').style.color = themeColor;
            document.getElementById('analysis-panel').style.borderColor = themeColor;
            
            // 稍微延迟一下，模拟网络请求大模型的时间
            document.getElementById('typewriter-text').innerHTML = '<span style="color:#00ff66">正在连接量子算力中心获取推演报告...</span>';
            setTimeout(() => {
                typeWriterEffect(detailedFortuneText, 'typewriter-text', 40);
            }, 800);
        });
    </script>

    </body>
</html>
