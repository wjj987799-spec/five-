<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行命局能量场 V8 (光效飞升版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020305; font-family: -apple-system, sans-serif; color: #c9d1d9; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { 
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); z-index: 10; 
            background: rgba(10, 14, 20, 0.6); backdrop-filter: blur(20px); 
            border: 1px solid rgba(88, 166, 255, 0.2); border-radius: 16px; padding: 20px; width: 90%; max-width: 340px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(88, 166, 255, 0.1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .neon-text { color: #fff; text-shadow: 0 0 15px #58a6ff, 0 0 30px #58a6ff; margin: 0; font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .sub-text { color: #58a6ff; font-size: 10px; margin-bottom: 15px; font-family: monospace; text-shadow: 0 0 5px rgba(88, 166, 255, 0.5); }
        .status-dot { color: #00ff44; animation: pulse 1.5s infinite; text-shadow: 0 0 8px #00ff44; }
        
        #toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #toggle-btn:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        
        #form-content { transition: opacity 0.3s ease; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: #8b9bb4; margin-bottom: 4px; letter-spacing: 1px; }
        .input-group input { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #30363d; 
            color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #58a6ff; box-shadow: 0 0 10px rgba(88, 166, 255, 0.3); }
        
        button.action-btn {
            width: 100%; background: linear-gradient(135deg, #1f6feb 0%, #00ff44 100%); 
            border: none; color: #000; padding: 12px; border-radius: 6px; 
            font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 5px; font-size: 15px; letter-spacing: 2px; box-shadow: 0 0 20px rgba(0, 255, 68, 0.4);
        }
        button.action-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 255, 68, 0.7); color: #fff; }

        #stats-panel { margin-top: 15px; font-family: monospace; font-size: 12px; display: none; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        #true-bazi { text-align: center; font-size: 22px; font-weight: bold; color: #fff; letter-spacing: 6px; margin-bottom: 10px; text-shadow: 0 0 15px #58a6ff, 0 0 30px #58a6ff; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; box-shadow: 0 0 8px currentColor; }
        
        #wake-btn { position: absolute; top: 20px; right: 20px; z-index: 20; display: none; background: rgba(10, 14, 20, 0.8); border: 1px solid #58a6ff; color: #58a6ff; padding: 8px 15px; border-radius: 20px; font-weight: bold; backdrop-filter: blur(10px); cursor: pointer; box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); transition: 0.3s; }
        #wake-btn:hover { background: #58a6ff; color: #000; box-shadow: 0 0 30px rgba(88, 166, 255, 0.6); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>
</head>
<body>

    <button id="wake-btn" onclick="toggleUI(true)">◎ 唤醒控制台</button>

    <div id="ui-layer">
        <div class="header-flex">
            <h1 class="neon-text">Alpha-Omega</h1>
            <button id="toggle-btn" onclick="toggleUI(false)">⊝ 隐藏面板</button>
        </div>
        <p class="sub-text"><span class="status-dot">●</span> 核心阵眼运转中 | 光子渲染拉满</p>
        
        <div id="form-content">
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex: 2;">
                    <label>年 (1900-2099)</label>
                    <input type="number" id="year" value="1998" />
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>月</label>
                    <input type="number" id="month" value="5" min="1" max="12" />
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>日</label>
                    <input type="number" id="day" value="15" min="1" max="31" />
                </div>
            </div>
            <div class="input-group">
                <label>时辰 (0-23)</label>
                <input type="number" id="hour" value="14" min="0" max="23" />
            </div>
            
            <button class="action-btn" onclick="runCalculation()">⚡ 拨动命运齿轮</button>

            <div id="stats-panel">
                <div id="true-bazi">庚辰 辛巳 壬戌 癸卯</div>
                <div style="color:#8b9bb4; margin-bottom: 8px; font-size:10px; text-align:center; letter-spacing: 1px;">先天五行解构配比</div>
                <div class="stat-row"><span style="color:#ff2a00;"><span class="color-dot" style="background:#ff2a00;"></span>火 (Fire)</span> <span id="stat-fire">0%</span></div>
                <div class="stat-row"><span style="color:#00e5ff;"><span class="color-dot" style="background:#00e5ff;"></span>水 (Water)</span> <span id="stat-water">0%</span></div>
                <div class="stat-row"><span style="color:#00ff44;"><span class="color-dot" style="background:#00ff44;"></span>木 (Wood)</span> <span id="stat-wood">0%</span></div>
                <div class="stat-row"><span style="color:#ffe600;"><span class="color-dot" style="background:#ffe600;"></span>金 (Metal)</span> <span id="stat-metal">0%</span></div>
                <div class="stat-row"><span style="color:#d4a373;"><span class="color-dot" style="background:#d4a373;"></span>土 (Earth)</span> <span id="stat-earth">0%</span></div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        function toggleUI(show) {
            const uiLayer = document.getElementById('ui-layer');
            const wakeBtn = document.getElementById('wake-btn');
            if (show) {
                uiLayer.style.transform = 'translate(-50%, 0) scale(1)';
                uiLayer.style.opacity = '1';
                uiLayer.style.pointerEvents = 'auto';
                wakeBtn.style.display = 'none';
            } else {
                uiLayer.style.transform = 'translate(-50%, -20px) scale(0.95)';
                uiLayer.style.opacity = '0';
                uiLayer.style.pointerEvents = 'none';
                wakeBtn.style.display = 'block';
            }
        }

        const WUXING_COLORS = {
            '火': new THREE.Color(0xff2a00), // 更炽热的红
            '水': new THREE.Color(0x00e5ff), // 更通透的青蓝
            '木': new THREE.Color(0x00ff44), // 更荧光的绿
            '金': new THREE.Color(0xffe600), // 更刺眼的金
            '土': new THREE.Color(0xd4a373)  // 沉稳的琥珀
        };

        const CHAR_TO_WUXING = {
            '甲':'木', '乙':'木', '丙':'火', '丁':'火', '戊':'土', '己':'土', '庚':'金', '辛':'金', '壬':'水', '癸':'水',
            '子':'水', '丑':'土', '寅':'木', '卯':'木', '辰':'土', '巳':'火', '午':'火', '未':'土', '申':'金', '酉':'金', '戌':'土', '亥':'水'
        };

        function calculateRealBazi(year, month, day, hour) {
            try {
                const solar = Solar.fromYmdHms(year, month, day, hour, 0, 0);
                const lunar = solar.getLunar();
                const bazi = lunar.getEightChar();
                const fullBaziString = bazi.getYear() + bazi.getMonth() + bazi.getDay() + bazi.getTime();
                let counts = { '火': 0, '水': 0, '木': 0, '金': 0, '土': 0 };
                for (let i = 0; i < fullBaziString.length; i++) {
                    if (CHAR_TO_WUXING[fullBaziString[i]]) counts[CHAR_TO_WUXING[fullBaziString[i]]]++;
                }
                let weights = {};
                for (let key in counts) weights[key] = counts[key] / 8;
                return { weights: weights, display: `${bazi.getYear()} ${bazi.getMonth()} ${bazi.getDay()} ${bazi.getTime()}` };
            } catch (err) { return null; }
        }

        // ==========================================
        // 核心渲染引擎升级
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // 增加雾化浓度，让远处的粒子有隐没感
        scene.fog = new THREE.FogExp2(0x020305, 0.003);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 150, 350); // 镜头拉近一点，增强压迫感
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 🌟 新增：本命阵眼 (中央背景发光矩阵)
        function createCoreTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            gradient.addColorStop(0, 'rgba(88, 166, 255, 0.4)'); // 核心高亮
            gradient.addColorStop(0.3, 'rgba(88, 166, 255, 0.1)'); // 中层光晕
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); // 边缘消散
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            return new THREE.CanvasTexture(canvas);
        }
        
        const coreGeo = new THREE.PlaneGeometry(600, 600);
        const coreMat = new THREE.MeshBasicMaterial({
            map: createCoreTexture(), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const coreMesh = new THREE.Mesh(coreGeo, coreMat);
        coreMesh.rotation.x = -Math.PI / 2; // 平躺在星系中央
        scene.add(coreMesh);

        // 粒子系统
        const particleCount = 5000; // 增加粒子数量让光效更饱满
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const initialY = new Float32Array(particleCount);
        const randomOffsets = new Float32Array(particleCount); // 为每个粒子分配随机时间偏移，产生错落的呼吸感

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            // 采用更密集的向心力分布算法
            const radius = Math.pow(Math.random(), 1.5) * 300; 
            const spinAngle = radius * 0.02; 
            const branchAngle = (Math.floor(Math.random() * 5) / 5) * Math.PI * 2; 
            
            const randomX = (Math.random() - 0.5) * 60;
            const randomY = (Math.random() - 0.5) * 40;
            const randomZ = (Math.random() - 0.5) * 60;

            positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
            positions[i3 + 1] = randomY; 
            positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;
            initialY[i] = positions[i3 + 1];
            randomOffsets[i] = Math.random() * Math.PI * 2; // 随机相位

            colors[i3] = 0.1; colors[i3 + 1] = 0.2; colors[i3 + 2] = 0.3; // 初始待机色
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3
