<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega 五行剑意引擎</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010204; font-family: -apple-system, sans-serif; color: #fff; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        #ui-top { position: absolute; top: 20px; left: 20px; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.5); letter-spacing: 1px; z-index: 10; font-size: 14px; }
        #status { color: #00ffff; margin-top: 5px; font-size: 12px; }

        /* 五行控制台 */
        #wuxing-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 10;
            background: rgba(10, 15, 20, 0.7); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent;
            font-weight: bold; font-size: 16px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #000; text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .btn:hover { transform: scale(1.15) translateY(-5px); }
        
        /* 五行专属色彩 */
        .btn-metal { background: #ffea00; box-shadow: 0 0 15px #ffea00; border-color: #fff; }
        .btn-wood  { background: #00ff44; box-shadow: 0 0 15px #00ff44; border-color: #fff; }
        .btn-water { background: #00ccff; box-shadow: 0 0 15px #00ccff; border-color: #fff; }
        .btn-fire  { background: #ff2200; box-shadow: 0 0 15px #ff2200; border-color: #fff; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        .btn-earth { background: #d28f41; box-shadow: 0 0 15px #d28f41; border-color: #fff; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

    <div id="ui-top">
        <div>Alpha-Omega 剑阵终端</div>
        <div id="status">▶ 当前剑意：太阴真水 (Water)</div>
    </div>

    <div id="wuxing-panel">
        <div class="btn btn-metal" onclick="switchElement('金')">金</div>
        <div class="btn btn-wood" onclick="switchElement('木')">木</div>
        <div class="btn btn-water" onclick="switchElement('水')">水</div>
        <div class="btn btn-fire" onclick="switchElement('火')">火</div>
        <div class="btn btn-earth" onclick="switchElement('土')">土</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 五行色彩字典 (RGB归一化值，供 Shader 使用)
        const WUXING_DATA = {
            '金': { hex: 0xffea00, vec: new THREE.Vector3(1.0, 0.9, 0.0), name: '庚金剑意' },
            '木': { hex: 0x00ff44, vec: new THREE.Vector3(0.0, 1.0, 0.2), name: '乙木剑意' },
            '水': { hex: 0x00ccff, vec: new THREE.Vector3(0.0, 0.8, 1.0), name: '太阴真水' },
            '火': { hex: 0xff2200, vec: new THREE.Vector3(1.0, 0.1, 0.0), name: '离火剑意' },
            '土': { hex: 0xd28f41, vec: new THREE.Vector3(0.8, 0.5, 0.2), name: '戊土剑意' }
        };

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010204, 0.003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 35);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        container.appendChild(renderer.domElement);

        // HDR 泛光
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.8, 0.1);
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ==========================================
        // 核心：支持五行动态注入的 Shader
        // ==========================================
        const swordVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            void main() {
                vUv = uv;
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const swordFragmentShader = `
            uniform float uTime;
            uniform vec3 uColor; // 接收前端传来的五行颜色
            
            varying vec2 vUv;
            varying vec3 vPosition;

            float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
            
            void main() {
                vec3 coreWhite = vec3(1.0, 1.0, 1.0);
                
                // Y轴流动感
                float flow = sin(vUv.y * 20.0 - uTime * 15.0) * 0.5 + 0.5;
                
                // 中心锐利内核
                float centerDist = abs(vUv.x - 0.5);
                float core = smoothstep(0.12, 0.0, centerDist);
                
                // 边缘噪声扰动撕裂
                float noise = random(vUv * 10.0 + uTime * 1.5) * 0.25;
                float edgeAlpha = smoothstep(0.4, 0.08, centerDist + noise);
                
                // 将传入的五行颜色与白色内核混合
                vec3 finalColor = mix(uColor * (flow + 0.6), coreWhite, core * 1.8);
                
                // 两端渐隐
                float tipFade = smoothstep(1.0, 0.6, vUv.y);
                float hiltFade = smoothstep(0.0, 0.1, vUv.y);
                
                gl_FragColor = vec4(finalColor, edgeAlpha * tipFade * hiltFade);
            }
        `;

        const swordGroup = new THREE.Group();
        const bladeGeo = new THREE.PlaneGeometry(3.5, 25, 32, 64);
        
        // 材质初始化 (默认：水)
        const bladeMat = new THREE.ShaderMaterial({
            uniforms: { 
                uTime: { value: 0.0 },
                uColor: { value: WUXING_DATA['水'].vec } // 注入初始五行色
            },
            vertexShader: swordVertexShader,
            fragmentShader: swordFragmentShader,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
        });

        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.rotation.z = Math.PI / 4;
        blade.rotation.x = Math.PI / 6;
        swordGroup.add(blade);
        scene.add(swordGroup);

        // ==========================================
        // 五行灵气火花拖尾
        // ==========================================
        const sparkCount = 400;
        const sparkGeo = new THREE.BufferGeometry();
        const sparkPos = new Float32Array(sparkCount * 3);
        const sparkVel = [];

        for(let i=0; i<sparkCount; i++) {
            sparkPos[i*3] = (Math.random() - 0.5) * 5;
            sparkPos[i*3+1] = (Math.random() - 0.5) * 20;
            sparkPos[i*3+2] = (Math.random() - 0.5) * 2;
            
            sparkVel.push({
                x: (Math.random() - 0.5) * 0.06,
                y: Math.random() * 0.15 + 0.05,
                z: (Math.random() - 0.5) * 0.06
            });
        }
        sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));

        const sparkMat = new THREE.PointsMaterial({
            color: WUXING_DATA['水'].hex, // 初始火花颜色
            size: 0.25, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
        });
        const sparks = new THREE.Points(sparkGeo, sparkMat);
        swordGroup.add(sparks);

        // ==========================================
        // 核心交互：动态切换五行
        // ==========================================
        function switchElement(elementName) {
            const data = WUXING_DATA[elementName];
            
            // 1. 瞬间重写 GPU Shader 颜色向量
            bladeMat.uniforms.uColor.value = data.vec;
            // 2. 瞬间重写火花粒子材质
            sparkMat.color.setHex(data.hex);
            
            // 3. 更新 UI
            const statusEl = document.getElementById('status');
            statusEl.innerText = `▶ 当前剑意：${data.name} (${elementName})`;
            statusEl.style.color = '#' + data.hex.toString(16).padStart(6, '0');
            statusEl.style.textShadow = `0 0 10px #${data.hex.toString(16).padStart(6, '0')}`;
            
            // 切换时的震荡特效
            swordGroup.position.y -= 1.5;
        }

        // 渲染循环
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            bladeMat.uniforms.uTime.value = time;
            
            // 弹性恢复震荡
            swordGroup.position.y += (Math.sin(time * 2) * 0.5 - swordGroup.position.y) * 0.1;

            const positions = sparkGeo.attributes.position.array;
            for(let i=0; i<sparkCount; i++) {
                positions[i*3] += sparkVel[i].x;
                positions[i*3+1] += sparkVel[i].y;
                positions[i*3+2] += sparkVel[i].z;

                if(positions[i*3+1] > 14) {
                    positions[i*3] = (Math.random() - 0.5) * 3;
                    positions[i*3+1] = -12 + Math.random() * 2;
                    positions[i*3+2] = (Math.random() - 0.5) * 2;
                }
            }
            sparkGeo.attributes.position.needsUpdate = true;

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
