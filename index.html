<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>纯粹五行 - 火星飞舞</title>
    <style>
        /* 重置默认边距，让画布铺满全屏，背景设为纯黑 */
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==========================================
        // 1. 基础场景设置 (Scene, Camera, Renderer)
        // ==========================================
        const scene = new THREE.Scene();
        // 调整相机角度，让火星看起来在屏幕中间偏下燃烧
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 增加一点像素比设置，让高分屏下边缘更清晰细腻
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. 自定义火星着色器 (Shader)
        // ==========================================
        const fireVertexShader = `
            attribute float size;
            attribute float life;
            varying float vLife;
            
            void main() {
                vLife = life;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                // 随着生命周期变小，同时受透视影响
                gl_PointSize = size * (vLife + 0.2) * (300.0 / -mvPosition.z); 
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fireFragmentShader = `
            varying float vLife;
            
            void main() {
                // 绘制柔和的圆形点
                float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                float alpha = 1.0 - smoothstep(0.0, 0.5, distanceToCenter);
                
                // 朱红到亮橙的过渡色
                vec3 color = vec3(1.0, 0.35, 0.05); 
                
                gl_FragColor = vec4(color, alpha * vLife);
            }
        `;

        // ==========================================
        // 3. 构建独立粒子系统
        // ==========================================
        const particleCount = 1200;
        const fireGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const lives = new Float32Array(particleCount);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
            // 火源集中在底部中心
            positions[i * 3] = (Math.random() - 0.5) * 6;     // X
            positions[i * 3 + 1] = -8 + Math.random() * 4;    // Y
            positions[i * 3 + 2] = (Math.random() - 0.5) * 6; // Z
            
            sizes[i] = Math.random() * 10 + 5; 
            lives[i] = Math.random(); 
            
            velocities.push({
                x: (Math.random() - 0.5) * 0.04,
                y: Math.random() * 0.08 + 0.04,
                z: (Math.random() - 0.5) * 0.04
            });
        }

        fireGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        fireGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        fireGeometry.setAttribute('life', new THREE.BufferAttribute(lives, 1));

        const fireMaterial = new THREE.ShaderMaterial({
            vertexShader: fireVertexShader,
            fragmentShader: fireFragmentShader,
            blending: THREE.AdditiveBlending, // 核心：让重叠的火星更亮
            depthWrite: false, 
            transparent: true
        });

        const fireParticles = new THREE.Points(fireGeometry, fireMaterial);
        scene.add(fireParticles);

        // ==========================================
        // 4. 物理运动与渲染循环
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            const posArray = fireParticles.geometry.attributes.position.array;
            const lifeArray = fireParticles.geometry.attributes.life.array;
            const time = Date.now() * 0.002;

            for (let i = 0; i < particleCount; i++) {
                lifeArray[i] -= 0.008; 

                if (lifeArray[i] <= 0) {
                    // 重置火星状态
                    lifeArray[i] = 1.0;
                    posArray[i * 3] = (Math.random() - 0.5) * 4;
                    posArray[i * 3 + 1] = -8; 
                    posArray[i * 3 + 2] = (Math.random() - 0.5) * 4;
                } else {
                    // 向上飘并加入类似热气流的横向扰动
                    posArray[i * 3] += velocities[i].x + Math.sin(time + i) * 0.015;
                    posArray[i * 3 + 1] += velocities[i].y;
                    posArray[i * 3 + 2] += velocities[i].z + Math.cos(time + i) * 0.015;
                }
            }

            fireParticles.geometry.attributes.position.needsUpdate = true;
            fireParticles.geometry.attributes.life.needsUpdate = true;

            // 让整个粒子群缓慢旋转，增加空间感
            fireParticles.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        animate();

        // ==========================================
        // 5. 窗口缩放自适应
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
