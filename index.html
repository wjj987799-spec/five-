<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行命局能量场 V5 (显卡直驱版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030508; font-family: -apple-system, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 40px; left: 20px; z-index: 10; pointer-events: none; }
        .neon-text { color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); margin: 0; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .sub-text { color: #8b9bb4; font-size: 12px; margin-top: 8px; font-family: monospace; }
        .status-dot { color: #10b981; animation: pulse 2s infinite; }
        #error-log { color: #ef4444; font-weight: bold; margin-top: 15px; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1 class="neon-text">先天五行能量场</h1>
        <p class="sub-text" id="status-text"><span class="status-dot">●</span> GLSL 底层着色器已接管 | 无限解析度</p>
        <div id="error-log"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        function showError(msg) {
            const errBox = document.getElementById('error-log');
            errBox.style.display = 'block';
            errBox.innerHTML += `❌ ${msg}<br>`;
        }

        try {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030508, 0.002);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 150, 400);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            
            // 完全拉满物理像素比
            renderer.setPixelRatio(window.devicePixelRatio); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const particleCount = 4000; // 在 shader 优化下，数量可以适当回调
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const initialY = new Float32Array(particleCount);

            const wuXingColors = [
                new THREE.Color(0xff2200), // 火 - 极致红
                new THREE.Color(0x00ccff), // 水 - 极致蓝
                new THREE.Color(0x00ff44), // 木 - 极致绿
                new THREE.Color(0xffea00), // 金 - 极致金
                new THREE.Color(0xb5824c)  // 土 - 极致琥珀
            ];

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = Math.random() * 250;
                const spinAngle = radius * 0.02; 
                const branchAngle = (Math.floor(Math.random() * 5) / 5) * Math.PI * 2; 
                
                const randomX = Math.pow(Math.random() - 0.5, 3) * 100;
                const randomY = Math.pow(Math.random() - 0.5, 3) * 80;
                const randomZ = Math.pow(Math.random() - 0.5, 3) * 100;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY; 
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;
                
                initialY[i] = positions[i3 + 1];

                const colorIndex = Math.floor((branchAngle / (Math.PI * 2)) * 5) % 5;
                const color = wuXingColors[colorIndex];
                
                if(Math.random() > 0.85) {
                    const randomColor = wuXingColors[Math.floor(Math.random() * 5)];
                    colors[i3] = randomColor.r; colors[i3 + 1] = randomColor.g; colors[i3 + 2] = randomColor.b;
                } else {
                    colors[i3] = color.r; colors[i3 + 1] = color.g; colors[i3 + 2] = color.b;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // ==========================================
            // 【终极武器】纯数学 Shader 材质
            // ==========================================
            const shaderMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute vec3 color;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        // 粒子大小根据深度缩放，并适配设备的真实像素密度
                        gl_PointSize = 1000.0 / -mvPosition.z * ${window.devicePixelRatio.toFixed(1)};
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // 计算片元到中心的距离，范围 0.0 -> 0.5
                        vec2 pt = gl_PointCoord - vec2(0.5);
                        float dist = length(pt) * 2.0; // 归一化到 0.0 -> 1.0
                        
                        // 直接用数学刀切出完美的正圆形
                        if (dist > 1.0) discard; 
                        
                        // 构造纯白的针尖级内核
                        float core = smoothstep(0.15, 0.0, dist);
                        
                        // 构造指数衰减的光晕，让五行颜色从内核溢出
                        float glow = pow(1.0 - dist, 1.5);
                        
                        // 核心白 + 外围色彩混合
                        vec3 finalColor = vColor * glow * 1.5 + vec3(1.0) * core * 1.2;
                        
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const particleSystem = new THREE.Points(geometry, shaderMaterial);
            scene.add(particleSystem);

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();

                particleSystem.rotation.y = elapsedTime * 0.05;
                const positionsAttribute = geometry.attributes.position;
                const posArray = positionsAttribute.array;
                
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    posArray[i3 + 1] = initialY[i] + Math.sin(elapsedTime * 2 + posArray[i3]*0.05) * 5;
                }
                positionsAttribute.needsUpdate = true;
                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (error) {
            showError(error.message);
        }
    </script>
</body>
</html>
