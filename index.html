<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博命盘 - 能量场析出</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505; /* 模拟深邃的数字空间底色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        /* 外层发光边框，增强 UI 科技感 */
        #chart-container {
            position: relative;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1) inset;
        }
        /* 扫描线动画效果 */
        #chart-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.05) 51%, transparent 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>

    <script>
        // 初始化 ECharts 实例
        const chartDom = document.getElementById('chart-container');
        const myChart = echarts.init(chartDom);

        // 模拟后台算法传回的五行百分比数据 (对应: 金, 木, 水, 火, 土)
        const energyData = [12, 45, 25, 5, 13];

        const option = {
            backgroundColor: 'transparent',
            
            // 极简风格的提示框，带有辉光效果
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(0, 15, 20, 0.8)',
                borderColor: '#00ffff',
                textStyle: {
                    color: '#00ffff',
                    fontFamily: 'Courier New'
                },
                shadowBlur: 10,
                shadowColor: '#00ffff'
            },

            // 雷达图核心配置
            radar: {
                indicator: [
                    { name: '金 (Metal)', max: 100 },
                    { name: '木 (Wood)', max: 100 },
                    { name: '水 (Water)', max: 100 },
                    { name: '火 (Fire)', max: 100 },
                    { name: '土 (Earth)', max: 100 }
                ],
                center: ['50%', '50%'],
                radius: '65%',
                shape: 'polygon', // 多边形轮廓
                splitNumber: 5,
                
                // 坐标轴名称样式：赛博青色 + 间距
                axisName: {
                    color: '#00ffff',
                    fontSize: 16,
                    fontWeight: 'bold',
                    letterSpacing: 2,
                    textShadowBlur: 5,
                    textShadowColor: '#00ffff'
                },
                
                // 网格分隔线：从内向外透明度渐变，模拟雷达波发散
                splitLine: {
                    lineStyle: {
                        color: [
                            'rgba(0, 255, 255, 0.1)',
                            'rgba(0, 255, 255, 0.2)',
                            'rgba(0, 255, 255, 0.4)',
                            'rgba(0, 255, 255, 0.6)',
                            'rgba(0, 255, 255, 0.8)'
                        ].reverse(),
                        width: 1
                    }
                },
                
                // 关闭默认的交替填充色，保持透明空灵感
                splitArea: {
                    show: false
                },
                
                // 从中心向外发射的轴线
                axisLine: {
                    lineStyle: {
                        color: 'rgba(0, 255, 255, 0.5)',
                        type: 'dashed' // 虚线增加机械感
                    }
                }
            },

            series: [
                {
                    name: '五行能量分布',
                    type: 'radar',
                    data: [
                        {
                            value: energyData,
                            name: '当前节点能量态',
                            
                            // 数据节点样式
                            itemStyle: {
                                color: '#00ffff',
                                borderColor: '#fff',
                                borderWidth: 1,
                                shadowBlur: 10,
                                shadowColor: '#00ffff'
                            },
                            
                            // 连线样式：高亮发光
                            lineStyle: {
                                color: '#00ffff',
                                width: 2,
                                shadowBlur: 15,
                                shadowColor: '#00ffff'
                            },
                            
                            // 面积填充区：半透明叠加辉光
                            areaStyle: {
                                color: new echarts.graphic.RadialGradient(0.5, 0.5, 1, [
                                    {
                                        offset: 0,
                                        color: 'rgba(0, 255, 255, 0.1)'
                                    },
                                    {
                                        offset: 1,
                                        color: 'rgba(0, 255, 255, 0.4)'
                                    }
                                ])
                            }
                        }
                    ],
                    // 加入一点初始动画效果
                    animationType: 'scale',
                    animationEasing: 'cubicOut',
                    animationDuration: 2000
                }
            ]
        };

        // 渲染图表
        myChart.setOption(option);

        // 响应式自适应
        window.addEventListener('resize', () => {
            myChart.resize();
        });
    </script>
</body>
</html>
