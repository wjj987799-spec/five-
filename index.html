    <script>
        // --- 1. 背景粒子特效引擎 (算力拉满呈现) ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 255, 65, 0.5)';
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.1)';
            
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                // 连线逻辑
                for (let j = index + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawParticles();

        // --- 2. 核心命理与交互逻辑 ---

            // UI 切换

            document.getElementById('loading-section').classList.remove('hidden');
            
            // 模拟高维演算延迟体验
            const loadingTexts = ["提取天体坐标...", "正在解析天干地支...", "生成五行能量场...", "连接 AI 推演模块..."];
            let step = 0;
            const textEl = document.getElementById('loading-text');
            
            const interval = setInterval(() => {
                step++;
                if (step < loadingTexts.length) {
                    textEl.innerText = loadingTexts[step];
                } else {
                    clearInterval(interval);
                    executeBaziLogic(); // 执行真实逻辑
                }
            }, 600);
        }

        function executeBaziLogic() {

            const [hour, minute] = timeStr.split(':').map(Number);

            const solar = Solar.fromYmdHms(year, month, day, hour, minute, 0);
            const lunar = solar.getLunar();
            const bazi = lunar.getEightChar();
            
            // 提取数据
            const pillars = [
                { name: '年柱', gan: bazi.getYearGan(), zhi: bazi.getYearZhi(), ganWx: bazi.getYearGanWuXing(), zhiWx: bazi.getYearZhiWuXing() },
                { name: '月柱', gan: bazi.getMonthGan(), zhi: bazi.getMonthZhi(), ganWx: bazi.getMonthGanWuXing(), zhiWx: bazi.getMonthZhiWuXing() },
                { name: '日柱 (日主)', gan: bazi.getDayGan(), zhi: bazi.getDayZhi(), ganWx: bazi.getDayGanWuXing(), zhiWx: bazi.getDayZhiWuXing() },
                { name: '时柱', gan: bazi.getTimeGan(), zhi: bazi.getTimeZhi(), ganWx: bazi.getTimeGanWuXing(), zhiWx: bazi.getTimeZhiWuXing() }
            ];

            // 渲染命盘
            const baziGrid = document.getElementById('bazi-grid');
            baziGrid.innerHTML = '';
            pillars.forEach(p => {
                baziGrid.innerHTML += `
                    <div class="pillar-box p-3 rounded flex flex-col items-center">
                        <span class="text-xs text-gray-500 mb-2">${p.name}</span>
                        <span class="text-2xl font-bold text-white">${p.gan}</span>
                        <span class="text-xs text-${getColorByWuXing(p.ganWx)}">${p.ganWx}</span>
                        <div class="w-full h-px bg-gray-700 my-2"></div>
                        <span class="text-2xl font-bold text-gray-300">${p.zhi}</span>
                        <span class="text-xs text-${getColorByWuXing(p.zhiWx)}">${p.zhiWx}</span>
                    </div>
                `;
            });

            // 统计五行并渲染
            let wxCount = { '金': 0, '木': 0, '水': 0, '火': 0, '土': 0 };
            pillars.forEach(p => { wxCount[p.ganWx]++; wxCount[p.zhiWx]++; });
            let wxHtml = `<div class="flex justify-between mt-2">`;
            for (let [wx, count] of Object.entries(wxCount)) {
                wxHtml += `<div class="text-center"><div class="text-${getColorByWuXing(wx)} font-bold">${wx}</div><div class="text-gray-400">${count}</div></div>`;
            }
            wxHtml += `</div>`;
            document.getElementById('wuxing-analysis').innerHTML = `原始能量基数统计：` + wxHtml;

            // 生成模拟 AI 报告 (日主分析)
            const dayMaster = pillars[2].gan;
            const dayMasterWx = pillars[2].ganWx;
            generateMockAIReport(dayMaster, dayMasterWx, wxCount);

            // 切换到结果视图
            document.getElementById('loading-section').classList.add('hidden');
            const resultSec = document.getElementById('result-section');
            resultSec.classList.remove('hidden');
            // 延迟一点加 opacity 实现渐显
            setTimeout(() => { resultSec.classList.remove('opacity-0'); }, 50);
        }

        // 辅助函数：根据五行返回 Tailwind 颜色类 (简化版)
        function getColorByWuXing(wx) {
            const map = { '金': 'yellow-500', '木': 'green-500', '水': 'blue-400', '火': 'red-500', '土': 'yellow-700' };
            return map[wx] || 'gray-400';
        }

        function generateMockAIReport(dayMaster, wx, wxCount) {
            const reportEl = document.getElementById('ai-report');
            const typeText = `${wx}${dayMaster}`; // e.g. 木甲
            
            // 简单的随机评语逻辑，这里可以未来接入真正的 Gemini API
            let lackMsg = "";
            let lackList = [];
            for(let key in wxCount) { if(wxCount[key] === 0) lackList.push(key); }
            if(lackList.length > 0) lackMsg = `<span class="text-red-400">系统警告：命局五行缺[${lackList.join('、')}]，能量场存在结构性失衡。</span>`;
            else lackMsg = `<span class="text-green-400">能量场扫描完成：五行俱全，底层架构稳定。</span>`;

            reportEl.innerHTML = `
                <p><span class="text-blue-400">[系统载入中]</span> 识别到主体核心（日主）为：<strong class="text-white text-lg">${dayMaster}</strong> (${wx})</p>
                <p><strong>底层性格代码：</strong>根据《滴天髓》算法解析，日元属${wx}，具备${dayMaster}之特性。通常表现为执行力强，在复杂系统中具有天然的架构能力。</p>
                <p><strong>能量场状态：</strong>${lackMsg}</p>
                <p><strong>当前周期建议 (Alpha破局策略)：</strong>在接下来的数据迭代周期中，建议重点补齐环境能量。避免高风险杠杆操作，寻找与自身五行相生的合伙人。</p>
                <div class="mt-4 p-3 border border-yellow-500/30 bg-yellow-500/10 text-yellow-200 rounded">
                    <strong>💡 进阶解锁：</strong>当前为基础算力推演结果。如需开启流年大运精算及财富节点预测，请连接全功率 AI 引擎。
                </div>
            `;
        }

        function resetApp() {
            document.getElementById('result-section').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('input-section').classList.remove('hidden');
                document.getElementById('loading-text').innerText = "正在连接命运矩阵...";
            }, 500);
        }
    </script>
