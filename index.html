<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行命局能量场 V4 (HD版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030508; font-family: -apple-system, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 40px; left: 20px; z-index: 10; pointer-events: none; }
        .neon-text { color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); margin: 0; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .sub-text { color: #8b9bb4; font-size: 12px; margin-top: 8px; font-family: monospace; }
        .status-dot { color: #10b981; animation: pulse 2s infinite; }
        #error-log { color: #ef4444; font-weight: bold; margin-top: 15px; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1 class="neon-text">先天五行能量场</h1>
        <p class="sub-text" id="status-text"><span class="status-dot">●</span> 视网膜级超清渲染已开启</p>
        <div id="error-log"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        function showError(msg) {
            const errBox = document.getElementById('error-log');
            errBox.style.display = 'block';
            errBox.innerHTML += `❌ ${msg}<br>`;
        }

        try {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030508, 0.002);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 150, 400);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            
            // 【画质升级 1】彻底解除像素封印，调用手机原生最高清分辨率
            renderer.setPixelRatio(window.devicePixelRatio); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 【画质升级 2】手搓 4 倍超清贴图，打造锐利内核
            function createHDTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 256; // 从 64 提升到 256
                canvas.height = 256;
                const context = canvas.getContext('2d');
                const gradient = context.createRadialGradient(128, 128, 0, 128, 128, 128);
                
                // 重新调配光晕比例：中心 5% 是绝对纯白的实体，边缘才是发光层
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                gradient.addColorStop(0.05, 'rgba(255, 255, 255, 1)'); // 恒星锐利内核
                gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.6)'); // 内层光晕
                gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.1)'); // 外层散射
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                context.fillStyle = gradient;
                context.fillRect(0, 0, 256, 256);
                return new THREE.CanvasTexture(canvas);
            }

            const particleCount = 3000; 
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const initialY = new Float32Array(particleCount);

            const wuXingColors = [
                new THREE.Color(0xff4422), // 火
                new THREE.Color(0x00e5ff), // 水
                new THREE.Color(0x33ff66), // 木
                new THREE.Color(0xfff5a0), // 金
                new THREE.Color(0xcca373)  // 土
            ];

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = Math.random() * 250;
                const spinAngle = radius * 0.02; 
                const branchAngle = (Math.floor(Math.random() * 5) / 5) * Math.PI * 2; 
                
                const randomX = Math.pow(Math.random() - 0.5, 3) * 100;
                const randomY = Math.pow(Math.random() - 0.5, 3) * 80;
                const randomZ = Math.pow(Math.random() - 0.5, 3) * 100;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY; 
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;
                
                initialY[i] = positions[i3 + 1];

                const colorIndex = Math.floor((branchAngle / (Math.PI * 2)) * 5) % 5;
                const color = wuXingColors[colorIndex];
                
                if(Math.random() > 0.8) {
                    const randomColor = wuXingColors[Math.floor(Math.random() * 5)];
                    colors[i3] = randomColor.r; colors[i3 + 1] = randomColor.g; colors[i3 + 2] = randomColor.b;
                } else {
                    colors[i3] = color.r; colors[i3 + 1] = color.g; colors[i3 + 2] = color.b;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 8, // 缩小一丢丢体积，配合高清纹理显得更精致
                map: createHDTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();

                particleSystem.rotation.y = elapsedTime * 0.05;
                const positionsAttribute = geometry.attributes.position;
                const posArray = positionsAttribute.array;
                
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    posArray[i3 + 1] = initialY[i] + Math.sin(elapsedTime * 2 + posArray[i3]*0.05) * 5;
                }
                positionsAttribute.needsUpdate = true;
                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (error) {
            showError(error.message);
        }
    </script>
</body>
</html>
