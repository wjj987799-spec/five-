        <div id="result-section" class="hidden opacity-0 transition-opacity duration-1000">

                    <div class="mt-6 p-4 border border-gray-700 rounded bg-black/50">

    <script>
        // 背景粒子引擎
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 255, 65, 0.5)';
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.1)';
            
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for (let j = index + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    if (Math.hypot(p.x - p2.x, p.y - p2.y) < 120) {
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); drawParticles();

        // 命理演算逻辑
        function startComputation() {
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading-section').classList.remove('hidden');
            
            const loadingTexts = ["提取天体坐标...", "正在解析天干地支...", "生成五行能量场...", "连接 AI 推演模块..."];
            let step = 0;
            const textEl = document.getElementById('loading-text');
            
            const interval = setInterval(() => {
                step++;
                if (step < loadingTexts.length) {
                    textEl.innerText = loadingTexts[step];
                } else {
                    clearInterval(interval);
                    executeBaziLogic();
                }
            }, 600); // 调整速度
        }

        // 获取完整颜色类名，防止 Tailwind 扫描不到
        function getColorClass(wx) {
            const map = { '金': 'text-yellow-500', '木': 'text-green-500', '水': 'text-blue-400', '火': 'text-red-500', '土': 'text-yellow-700' };
            return map[wx] || 'text-gray-400';
        }

        function executeBaziLogic() {
            try {
                const dateStr = document.getElementById('birthDate').value;
                const timeStr = document.getElementById('birthTime').value;
                const [year, month, day] = dateStr.split('-').map(Number);
                const [hour, minute] = timeStr.split(':').map(Number);

                const solar = Solar.fromYmdHms(year, month, day, hour, minute, 0);
                const bazi = solar.getLunar().getEightChar();
                
                const pillars = [
                    { name: '年柱', gan: bazi.getYearGan(), zhi: bazi.getYearZhi(), ganWx: bazi.getYearGanWuXing(), zhiWx: bazi.getYearZhiWuXing() },
                    { name: '月柱', gan: bazi.getMonthGan(), zhi: bazi.getMonthZhi(), ganWx: bazi.getMonthGanWuXing(), zhiWx: bazi.getMonthZhiWuXing() },
                    { name: '日主', gan: bazi.getDayGan(), zhi: bazi.getDayZhi(), ganWx: bazi.getDayGanWuXing(), zhiWx: bazi.getDayZhiWuXing() },
                    { name: '时柱', gan: bazi.getTimeGan(), zhi: bazi.getTimeZhi(), ganWx: bazi.getTimeGanWuXing(), zhiWx: bazi.getTimeZhiWuXing() }
                ];

                const baziGrid = document.getElementById('bazi-grid');
                baziGrid.innerHTML = '';
                pillars.forEach(p => {
                    baziGrid.innerHTML += `
                        <div class="pillar-box p-3 rounded flex flex-col items-center">
                            <span class="text-xs text-gray-500 mb-2">${p.name}</span>
                            <span class="text-2xl font-bold text-white">${p.gan}</span>
                            <span class="text-xs font-bold ${getColorClass(p.ganWx)}">${p.ganWx}</span>
                            <div class="w-full h-px bg-gray-700 my-2"></div>
                            <span class="text-2xl font-bold text-gray-300">${p.zhi}</span>
                            <span class="text-xs font-bold ${getColorClass(p.zhiWx)}">${p.zhiWx}</span>
                        </div>
                    `;
                });

                let wxCount = { '金': 0, '木': 0, '水': 0, '火': 0, '土': 0 };
                pillars.forEach(p => { wxCount[p.ganWx]++; wxCount[p.zhiWx]++; });
                
                let wxHtml = `<div class="flex justify-between mt-2">`;
                for (let [wx, count] of Object.entries(wxCount)) {
                    wxHtml += `<div class="text-center"><div class="${getColorClass(wx)} font-bold">${wx}</div><div class="text-gray-400">${count}</div></div>`;
                }
                wxHtml += `</div>`;
                document.getElementById('wuxing-analysis').innerHTML = `能量基数：` + wxHtml;

                const dayMaster = pillars[2].gan;
                const dayMasterWx = pillars[2].ganWx;
                
                let lackList = [];
                for(let key in wxCount) { if(wxCount[key] === 0) lackList.push(key); }
                let lackMsg = lackList.length > 0 ? 
                    `<span class="text-red-400">警告：五行缺[${lackList.join('、')}]，底层架构失衡。</span>` : 
                    `<span class="text-green-400">扫描完成：五行俱全，结构稳定。</span>`;

                document.getElementById('ai-report').innerHTML = `
                    <p><span class="text-blue-400">[系统载入]</span> 主体核心：<strong class="text-white text-lg">${dayMaster}</strong> (${dayMasterWx})</p>
                    <p><strong>底层代码：</strong>日元属${dayMasterWx}，具${dayMaster}之性。执行力强，擅长系统架构。</p>
                    <p><strong>能量场状态：</strong>${lackMsg}</p>
                    <p><strong>Alpha破局策略：</strong>在下一迭代周期中，重点补齐环境能量。避免高风险杠杆，寻找相生属性合伙人。</p>
                    <div class="mt-4 p-3 border border-yellow-500/30 bg-yellow-500/10 text-yellow-200 rounded text-xs">
                        💡 进阶：当前为基础算力。需开启大运流年精算，请接入全功率引擎。
                    </div>
                `;

                document.getElementById('loading-section').classList.add('hidden');
                const resultSec = document.getElementById('result-section');
                resultSec.classList.remove('hidden');
                setTimeout(() => { resultSec.classList.remove('opacity-0'); }, 50);

            } catch(e) {
                alert("推演发生异常，请检查输入格式。");
            }
        }

        function resetApp() {
            document.getElementById('result-section').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('input-section').classList.remove('hidden');
                document.getElementById('loading-text').innerText = "正在连接命运矩阵...";
            }, 500);
        }
    </script>
</body>
</html>
