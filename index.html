<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博五行 - 能量粒子视界</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* 极深灰背景，凸显发光效果 */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            pointer-events: none; /* 让鼠标事件穿透到 3D 画布 */
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <h1 style="letter-spacing: 10px; font-weight: 300;">壬水 · 润下</h1>
        <p>滑动鼠标干预能量场</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 基础场景设置
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // 添加一点全局雾效，增加空间感
        scene.fog = new THREE.FogExp2(0x050505, 0.3);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 性能优化
        // 开启加色混合所需配置
        renderer.setBlendMode = THREE.AdditiveBlending;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // 2. 构建粒子系统
        const particleCount = 100000; // 10万粒子
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const randoms = new Float32Array(particleCount);

        // 随机在圆盘范围内生成粒子
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 4;
            const theta = Math.random() * Math.PI * 2;
            
            positions[i * 3] = r * Math.cos(theta);     // x
            positions[i * 3 + 1] = (Math.random() - 0.5) * 0.5; // y (初始厚度)
            positions[i * 3 + 2] = r * Math.sin(theta); // z
            
            // 为每个粒子赋予一个随机种子，用于 Shader 中的差异化运算
            randoms[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        // 3. 核心：编写 Shader 材质
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColor: { value: new THREE.Color('#00ffff') }, // 赛博青色，代表水/木
                uMouse: { value: new THREE.Vector2(0, 0) }      // 预留交互接口
            },
            vertexShader: `
                uniform float uTime;
                attribute float aRandom;
                varying float vElevation;

                void main() {
                    vec4 modelPosition = modelMatrix * vec4(position, 1.0);
                    
                    // 核心动力学：利用正弦余弦构建漩涡力场
                    float angle = atan(modelPosition.x, modelPosition.z);
                    float distance = length(modelPosition.xz);
                    
                    // 随时间推移的螺旋波动
                    float wave = sin(distance * 3.0 - uTime * 2.0 + aRandom * 6.28) * 0.2;
                    modelPosition.y += wave;
                    
                    // 粒子越靠近中心越高，越向外越平缓
                    modelPosition.y += (1.0 / (distance + 0.5)) * 0.5 - 0.5;

                    vec4 viewPosition = viewMatrix * modelPosition;
                    vec4 projectedPosition = projectionMatrix * viewPosition;
                    gl_Position = projectedPosition;

                    // 粒子大小衰减：近大远小，且叠加一点随机闪烁
                    gl_PointSize = (30.0 * aRandom + 10.0) * (1.0 / - viewPosition.z);
                    
                    // 传递给片元着色器的高度数据，用于颜色渐变
                    vElevation = modelPosition.y;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vElevation;

                void main() {
                    // 将方形粒子裁剪成圆形，并制作发光边缘柔和度
                    float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                    float strength = 0.05 / distanceToCenter - 0.1;
                    
                    // 基于粒子的高低（Y轴）微调颜色，实现纵深感
                    vec3 mixedColor = mix(vec3(0.0, 0.1, 0.4), uColor, vElevation * 2.0 + 0.8);
                    
                    gl_FragColor = vec4(mixedColor, strength);
                }
            `,
            transparent: true,
            depthWrite: false, // 关键：关闭深度写入，开启加色混合产生辉光
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 4. 交互：监听鼠标位置 (为后续接入 MediaPipe 手势预留)
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            material.uniforms.uMouse.value = mouse;
            
            // 简单的鼠标互动：轻微改变摄像机角度或粒子系统的倾斜
            particles.rotation.x = mouse.y * 0.2;
            particles.rotation.z = -mouse.x * 0.2;
        });

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. 动画循环
        const clock = new THREE.Clock();
        function animate() {
            const elapsedTime = clock.getElapsedTime();
            
            // 更新 Shader 中的时间 Uniform
            material.uniforms.uTime.value = elapsedTime;
            
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
