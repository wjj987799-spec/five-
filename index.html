```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Def Real-Time Earth</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying vec3 vNormal;
        void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    <script id="fragmentShader" type="x-shader/fragment">
        varying vec2 vUv;
        varying vec3 vNormal;
        uniform float time;
        void main() {
            float intensity = pow(0.7 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
            vec3 atmosphere = vec3(0.3, 0.6, 1.0) * intensity;
            // 模拟陆地与海洋的色彩混合 (程序化伪纹理)
            vec3 color = mix(vec3(0.0, 0.2, 0.5), vec3(0.2, 0.5, 0.1), sin(vUv.x * 20.0) * cos(vUv.y * 20.0) * 0.5 + 0.5);
            gl_FragColor = vec4(color + atmosphere, 1.0);
        }
    </script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(1, 128, 128); // 高细分保证边缘平滑
        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: { time: { value: 0.0 } }
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.002;
            material.uniforms.time.value += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
