<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行命局能量场 V7 (历法注魂版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030508; font-family: -apple-system, sans-serif; color: #c9d1d9; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { 
            position: absolute; top: 40px; left: 20px; z-index: 10; 
            background: rgba(13, 17, 23, 0.6); backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .neon-text { color: #fff; text-shadow: 0 0 10px rgba(88, 166, 255, 0.8); margin: 0 0 5px 0; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        .sub-text { color: #8b9bb4; font-size: 11px; margin-bottom: 20px; font-family: monospace; }
        .status-dot { color: #3fb950; animation: pulse 2s infinite; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #8b9bb4; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #30363d; 
            color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 14px; box-sizing: border-box;
            outline: none; transition: border 0.3s;
        }
        .input-group input:focus { border-color: #58a6ff; }
        
        button {
            width: 100%; background: linear-gradient(90deg, #1f6feb, #3fb950); 
            border: none; color: white; padding: 10px; border-radius: 6px; 
            font-weight: bold; cursor: pointer; transition: opacity 0.3s; margin-top: 5px;
        }
        button:hover { opacity: 0.8; }

        #stats-panel { margin-top: 20px; font-family: monospace; font-size: 12px; display: none; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px;}
        #true-bazi { text-align: center; font-size: 18px; font-weight: bold; color: #58a6ff; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 0 0 8px rgba(88, 166, 255, 0.5); }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1 class="neon-text">Alpha-Omega 命局引擎</h1>
        <p class="sub-text"><span class="status-dot">●</span> lunar-js 节气计算核心已桥接</p>
        
        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex: 2;">
                <label>年 (1900-2099)</label>
                <input type="number" id="year" value="1998" />
            </div>
            <div class="input-group" style="flex: 1;">
                <label>月</label>
                <input type="number" id="month" value="5" min="1" max="12" />
            </div>
            <div class="input-group" style="flex: 1;">
                <label>日</label>
                <input type="number" id="day" value="15" min="1" max="31" />
            </div>
        </div>
        <div class="input-group">
            <label>出生时辰 (0-23) - 决定时柱核心</label>
            <input type="number" id="hour" value="14" min="0" max="23" />
        </div>
        
        <button onclick="runCalculation()">推演真实命局流转</button>

        <div id="stats-panel">
            <div id="true-bazi">庚辰 辛巳 壬戌 癸卯</div>
            <div style="color:#8b9bb4; margin-bottom: 8px; font-size:10px; text-align:center;">天干地支五行解构占比</div>
            <div class="stat-row"><span style="color:#ff2200;"><span class="color-dot" style="background:#ff2200;"></span>火 (Fire)</span> <span id="stat-fire">0%</span></div>
            <div class="stat-row"><span style="color:#00ccff;"><span class="color-dot" style="background:#00ccff;"></span>水 (Water)</span> <span id="stat-water">0%</span></div>
            <div class="stat-row"><span style="color:#00ff44;"><span class="color-dot" style="background:#00ff44;"></span>木 (Wood)</span> <span id="stat-wood">0%</span></div>
            <div class="stat-row"><span style="color:#ffea00;"><span class="color-dot" style="background:#ffea00;"></span>金 (Metal)</span> <span id="stat-metal">0%</span></div>
            <div class="stat-row"><span style="color:#b5824c;"><span class="color-dot" style="background:#b5824c;"></span>土 (Earth)</span> <span id="stat-earth">0%</span></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ==========================================
        // 模块 1：天干地支 ⇌ 极致玄学五行色彩映射字典
        // ==========================================
        const WUXING_COLORS = {
            '火': new THREE.Color(0xff2200),
            '水': new THREE.Color(0x00ccff),
            '木': new THREE.Color(0x00ff44),
            '金': new THREE.Color(0xffea00),
            '土': new THREE.Color(0xb5824c)
        };

        const CHAR_TO_WUXING = {
            '甲':'木', '乙':'木', '丙':'火', '丁':'火', '戊':'土', '己':'土', '庚':'金', '辛':'金', '壬':'水', '癸':'水',
            '子':'水', '丑':'土', '寅':'木', '卯':'木', '辰':'土', '巳':'火', '午':'火', '未':'土', '申':'金', '酉':'金', '戌':'土', '亥':'水'
        };

        // ==========================================
        // 模块 2：真·历法解析引擎 (调用 lunar-javascript)
        // ==========================================
        function calculateRealBazi(year, month, day, hour) {
            try {
                // 实例化阳历对象，自动换算太阳黄经和节气
                const solar = Solar.fromYmdHms(year, month, day, hour, 0, 0);
                const lunar = solar.getLunar();
                const bazi = lunar.getEightChar();
                
                // 获取四柱八字字符串
                const yearChar = bazi.getYear();
                const monthChar = bazi.getMonth();
                const dayChar = bazi.getDay();
                const timeChar = bazi.getTime();
                
                const fullBaziString = yearChar + monthChar + dayChar + timeChar;
                const displayString = `${yearChar} ${monthChar} ${dayChar} ${timeChar}`;

                // 统计五行分布
                let counts = { '火': 0, '水': 0, '木': 0, '金': 0, '土': 0 };
                for (let i = 0; i < fullBaziString.length; i++) {
                    const wx = CHAR_TO_WUXING[fullBaziString[i]];
                    if (wx) counts[wx]++;
                }
                
                // 计算比例
                let weights = {};
                for (let key in counts) {
                    weights[key] = counts[key] / 8; // 总计8个字
                }
                
                return { weights: weights, display: displayString };
            } catch (err) {
                console.error("历法推演错误:", err);
                alert("历法推演错误，请检查输入的日期是否合法！");
                return null;
            }
        }

        // ==========================================
        // 模块 3：纯 GLSL 显卡直驱 3D 渲染器
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030508, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 150, 400);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const particleCount = 4000; 
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const initialY = new Float32Array(particleCount);

        // 初始静默状态（幽蓝色调，无具体五行倾向）
        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            const radius = Math.random() * 250;
            const spinAngle = radius * 0.02; 
            const branchAngle = (Math.floor(Math.random() * 5) / 5) * Math.PI * 2; 
            
            const randomX = Math.pow(Math.random() - 0.5, 3) * 100;
            const randomY = Math.pow(Math.random() - 0.5, 3) * 80;
            const randomZ = Math.pow(Math.random() - 0.5, 3) * 100;

            positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
            positions[i3 + 1] = randomY; 
            positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;
            initialY[i] = positions[i3 + 1];

            colors[i3] = 0.05; colors[i3 + 1] = 0.2; colors[i3 + 2] = 0.4;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const shaderMaterial = new THREE.ShaderMaterial({
            vertexShader: `
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 1000.0 / -mvPosition.z * ${window.devicePixelRatio.toFixed(1)};
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    vec2 pt = gl_PointCoord - vec2(0.5);
                    float dist = length(pt) * 2.0; 
                    if (dist > 1.0) discard; 
                    float core = smoothstep(0.15, 0.0, dist);
                    float glow = pow(1.0 - dist, 1.5);
                    vec3 finalColor = vColor * glow * 1.5 + vec3(1.0) * core * 1.2;
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        scene.add(particleSystem);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            // 基础自转
            particleSystem.rotation.y = elapsedTime * 0.05;
            
            const positionsAttribute = geometry.attributes.position;
            const posArray = positionsAttribute.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                posArray[i3 + 1] = initialY[i] + Math.sin(elapsedTime * 2 + posArray[i3]*0.05) * 5;
            }
            positionsAttribute.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 模块 4：数据与视觉的融合注魂
        // ==========================================
        function runCalculation() {
            const y = parseInt(document.getElementById('year').value);
            const m = parseInt(document.getElementById('month').value);
            const d = parseInt(document.getElementById('day').value);
            const h = parseInt(document.getElementById('hour').value);

            // 1. 调用极客历法引擎算力
            const result = calculateRealBazi(y, m, d, h);
            if (!result) return;
            
            const weights = result.weights;

            // 2. 将真实的八字渲染到 UI
            document.getElementById('stats-panel').style.display = 'block';
            document.getElementById('true-bazi').innerText = result.display;
            
            document.getElementById('stat-fire').innerText = (weights['火'] * 100).toFixed(0) + '%';
            document.getElementById('stat-water').innerText = (weights['水'] * 100).toFixed(0) + '%';
            document.getElementById('stat-wood').innerText = (weights['木'] * 100).toFixed(0) + '%';
            document.getElementById('stat-metal').innerText = (weights['金'] * 100).toFixed(0) + '%';
            document.getElementById('stat-earth').innerText = (weights['土'] * 100).toFixed(0) + '%';

            // 3. 将抽象玄学数据具象化为显卡粒子
            const colorsAttribute = geometry.attributes.color;
            const colArray = colorsAttribute.array;
            
            let colorPool = [];
            for (let key in weights) {
                const count = Math.floor(weights[key] * particleCount);
                for(let k=0; k<count; k++) colorPool.push(WUXING_COLORS[key]);
            }
            // 填补尾数舍入缺失的粒子
            while(colorPool.length < particleCount) colorPool.push(WUXING_COLORS['土']);
            
            // 打乱粒子阵营，重组气场
            colorPool.sort(() => Math.random() - 0.5);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                colArray[i3] = colorPool[i].r;
                colArray[i3 + 1] = colorPool[i].g;
                colArray[i3 + 2] = colorPool[i].b;
            }
            
            // 闪电级热更新
            colorsAttribute.needsUpdate = true;
            // 造成命运齿轮转动时的强震荡感
            particleSystem.rotation.y -= 0.8;
            particleSystem.rotation.x = (Math.random() - 0.5) * 0.5;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
